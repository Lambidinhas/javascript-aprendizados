<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<header id="cabecalho">
    <img src="/styles/img/kogo.jpeg" alt="Logo" class="logo">
    <h1 class="title">CALCULE SEU IMC</h1>
</header>

<section id="corpo"> 

    <div class="container">

        <h2>Coloque seus dados</h2>

        <input type="number" id="altura" placeholder="Altura (ex: 1.75)">
        <input type="number" id="peso" placeholder="Peso (kg)">

        <button id="botao">Calcular</button>

        <p id="resposta">Resultado</p>
        <p id="IMC"></p>

    </div>

</section>

<footer id="rodape"></footer>

<script src="/styles/script.js"></script>
</body>
</html>
