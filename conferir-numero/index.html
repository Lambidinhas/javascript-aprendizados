<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferir Número</title>
    <link rel="stylesheet" href="/conferir-numero/assests/styles.css">
</head>

<body>
    <section class="container">

        <h1>Confira se o numero é divisivel por 3 ou 5</h1>

        <div>
            <input type="number" id="number" min="0" max="100">
        </div>

        <form>
            <button type="button" id="btn">Clique para conferir</button>
        </form>

        <div>
            <p id="result"></p>
        </div>

    </section>

    <script src="/conferir-numero/assests/script.js"></script>
</body>
</html>
